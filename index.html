<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B4332" />
    <meta name="description" content="Tamkeen — Islamic habit tracker and personal empowerment app" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <body class="bg-tamkeen-cream">
    <div id="root">
      <!-- CSS-only fallback shown while JS loads. React removes this on mount. -->
      <div id="app-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#FAFAF5;font-family:sans-serif;">
        <div style="width:48px;height:48px;border:4px solid #1B4332;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p style="margin-top:16px;color:#1B4332;font-size:14px;">Loading Tamkeen…</p>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
